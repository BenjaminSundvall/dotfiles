# ---------- Fundamentals ----------

# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start window/pane numbering at 1 (0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Generous scrollback
set -g history-limit 50000

# Faster key repetition (default 500ms is sluggish)
set -sg escape-time 10

# Enable mouse (scrolling, pane resizing, window switching)
set -g mouse on

# ---------- True color support (critical for Neovim themes) ----------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---------- Vi-mode for copy/scroll ----------

setw -g mode-keys vi

# v to begin selection, y to yank (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# On Linux, replace "pbcopy" with "xclip -selection clipboard"

# ---------- Pane navigation (vim-style) ----------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------- Splits that make spatial sense ----------

# | for vertical split, - for horizontal split
# Open new panes in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also inherit the current directory
bind c new-window -c "#{pane_current_path}"

# ---------- Reload config without restarting ----------

bind r source-file ~/.tmux.conf \; display "Config reloaded"

