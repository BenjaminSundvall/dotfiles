# ---------- Fundamentals ----------

# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Faster key repetition (default 500ms is sluggish)
set -sg escape-time 0

# Generous scrollback
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Start window/pane numbering at 1 (0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Enable mouse (scrolling, pane resizing, window switching)
set -g mouse on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ---------- True color support (critical for Neovim themes) ----------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---------- Status bar placement ----------

set-option -g status-position bottom	# top/bottom

# ---------- Vi-mode for copy/scroll ----------

setw -g mode-keys vi

# v to begin selection, y to yank (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# ---------- Splits that make spatial sense ----------

# v for vertical split, s for horizontal split
# Open new panes in the current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also inherit the current directory
bind c new-window -c "#{pane_current_path}"

# Close pane (matches vim's <leader>q)
bind q kill-pane

# ---------- Reload config without restarting ----------

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ---------- Plugin List ----------
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'

# Smart pane switching with awareness of Vim splits
set -g @plugin 'christoomey/vim-tmux-navigator'

# ---------- Initialize TMUX Plugin Manager (TPM) ----------
run '~/.config/tmux/plugins/tpm/tpm'
