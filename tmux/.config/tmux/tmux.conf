# ---------- Fundamentals ----------

# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Faster key repetition (default 500ms is sluggish)
set -sg escape-time 0

# Generous scrollback
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Start window/pane numbering at 1 (0 is far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Enable mouse (scrolling, pane resizing, window switching)
set -g mouse on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Get C(-s)-Tab passthrough from Alacritty
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

unbind '\'
bind '\' confirm-before "kill-server"

# ---------- True color support (critical for Neovim themes) ----------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---------- Status bar placement ----------

set-option -g status-position top # top/bottom

# ---------- Vi-mode for copy/scroll ----------

setw -g mode-keys vi

# v to begin selection, y to yank (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# ---------- Splits that make spatial sense ----------

# v for vertical split, s for horizontal split
# Open new panes in the current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also inherit the current directory
bind c new-window -c "#{pane_current_path}"

# Close pane (matches vim's <leader>q)
bind -n C-q kill-pane

# ---------- Window Control ----------

# Go to previous window with Ctrl+Tab
bind -n C-Tab last-window

# Jump to windows with C-[1-9]
bind -n C-0 select-window -t 0
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# Open Window Selector
bind C-Space choose-window

# Move windows left/right with <prefix> and </>
bind -r > swap-window -t +1 \; select-window -t +1
bind -r < swap-window -t -1 \; select-window -t -1

# ---------- Reload config without restarting ----------

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ---------- Plugin List  ----------
# NOTE: Run <prefix>I to install newly added plugins

# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Smart pane switching with awareness of Vim splits
set -g @plugin 'christoomey/vim-tmux-navigator'

# Set colorscheme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'

# ---------- Initialize TMUX Plugin Manager (TPM) ----------
if-shell -F '#{==:#{@tpm_initialized},}' {
    set -g @tpm_initialized 1
    run '~/.config/tmux/plugins/tpm/tpm'
}
