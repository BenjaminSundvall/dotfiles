import = [
    "~/.config/alacritty/themes/gruvbox.toml"
    #"~/.config/alacritty/themes/tokyo-night.toml"
]

[shell]
program = "/bin/zsh"

# Font setup

[font]
size = 13.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

# Pass through C-Tab and C-[0-9]

[[keyboard.bindings]]
key = "Tab"
mods = "Control"
chars = "\u001b[9;5u"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
chars = "\u001b[48;5u"

[[keyboard.bindings]]
key = "Key1"
mods = "Control"
chars = "\u001b[49;5u"

[[keyboard.bindings]]
key = "Key2"
mods = "Control"
chars = "\u001b[50;5u"

[[keyboard.bindings]]
key = "Key3"
mods = "Control"
chars = "\u001b[51;5u"

[[keyboard.bindings]]
key = "Key4"
mods = "Control"
chars = "\u001b[52;5u"

[[keyboard.bindings]]
key = "Key5"
mods = "Control"
chars = "\u001b[53;5u"

[[keyboard.bindings]]
key = "Key6"
mods = "Control"
chars = "\u001b[54;5u"

[[keyboard.bindings]]
key = "Key7"
mods = "Control"
chars = "\u001b[55;5u"

[[keyboard.bindings]]
key = "Key8"
mods = "Control"
chars = "\u001b[56;5u"

[[keyboard.bindings]]
key = "Key9"
mods = "Control"
chars = "\u001b[57;5u"
